name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug secrets (lengths only)
        env:
          VITE_SHEET_ID: ${{ secrets.VITE_SHEET_ID }}
          VITE_SHEETS_API_KEY: ${{ secrets.VITE_SHEETS_API_KEY }}
          VITE_WORKER_URL: ${{ secrets.VITE_WORKER_URL }}
        run: |
          echo "VITE_SHEET_ID length: ${#VITE_SHEET_ID}"
          echo "VITE_SHEETS_API_KEY length: ${#VITE_SHEETS_API_KEY}"
          echo "VITE_WORKER_URL length: ${#VITE_WORKER_URL}"

      - name: Build
        env:
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_SHEET_ID: ${{ secrets.VITE_SHEET_ID }}
          VITE_SHEETS_API_KEY: ${{ secrets.VITE_SHEETS_API_KEY }}
          VITE_WORKER_URL: ${{ secrets.VITE_WORKER_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
